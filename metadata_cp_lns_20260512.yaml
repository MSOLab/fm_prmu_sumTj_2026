input_dir: "resources/vrm"
benchmark_idx_list:
  - 1
  - 6
first: 1
last: 540
benchmark_filename_format: "{}.txt"

# Scenario configurations
dicts_of_i_o_data_path:
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260512_ablation_c1.yaml"
    output_dir: "output_cp_lns/20260512_ablation_c1"
    description: "EDD + Base CP"
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260512_ablation_c2.yaml"
    output_dir: "output_cp_lns/20260512_ablation_c2"
    description: "EDD + NEH_MS + II(1) + Base CP"
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260512_ablation_c3.yaml"
    output_dir: "output_cp_lns/20260512_ablation_c3"
    description: "LB + EDD + NEH_MS + II(1) + Base CP"
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260512_ablation_c4.yaml"
    output_dir: "output_cp_lns/20260512_ablation_c4"
    description: "EDD + NEH_MS + PW-CP(7,0,7,1) + II(1) + Base CP"
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260512_ablation_c5.yaml"
    output_dir: "output_cp_lns/20260512_ablation_c5"
    description: "LB + EDD + NEH_MS + PW-CP(7,0,7,1) + II(1) + Base CP"

# Output and Logging configuration
output_dir_scenarios: "Outputs_scenarios"
scenario_log_filename: "multi_scenario_runner.log"
result_dir_name: "results"

# Execution configuration
instance_worker_cnt: 12

# Analysis and plotting options
draw_gantt: false
painter_thread_cnt: 8
result_gantt_filename_format: "{}_result_gantt.svg"
draw_progress_plot: true
progress_plot_filename_format: "{}_progress_plot.png"
drop_first_values_percent: 0.0
