# NOTE: PW-CP runs with refresh_deadline_every_step: true in this experiment set.
# solver_thread_cnt is intentionally omitted from the pw_cp steps: thread count
# 1 vs 8 produced no difference in results.
#
# Input data configuration
vrm_common_params_rel_path: "resources/vrm_common_params.yaml"
baseline_csv_path: "resources/vrm_ref/naderi2023CPOCodeResult.csv"
input_dir: "resources/vrm"
# benchmark_idx_list: [1, 2, 3, 4, 5]
first: 1
last: 540
benchmark_filename_format: "{}.txt"

# Scenario configurations
dicts_of_i_o_data_path:
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260609_ablation_c3_refresh.yaml"
    output_dir: "20260609_ablation_c3_refresh"
    description: "NEH-MS + PW-CP(7,0,7,1,refresh) + II(1) + Base CP"
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260609_ablation_c4_refresh.yaml"
    output_dir: "20260609_ablation_c4_refresh"
    description: "NEH-MS + LB-init(NEH-MS) + PW-CP(7,0,7,1,refresh) + II(1) + Base CP"
  - stopping_criteria_rel_path: "configs_cp_lns/stopping_criteria_nm.yaml"
    subroutine_flow_rel_path: "configs_cp_lns/20260609_ablation_c5.yaml"
    output_dir: "20260609_ablation_c5"
    description: "NEH-MS + LB-init(NEH-MS) + PW-CP(7,0,7,1,refresh) + Base CP"

# Output and Logging configuration
output_dir_scenarios: "Outputs_scenarios"
scenario_log_filename: "multi_scenario_runner.log"
result_dir_name: "results"

# Execution configuration
instance_worker_cnt: 10

# Analysis and plotting options
draw_gantt: false
painter_thread_cnt: 8
result_gantt_filename_format: "{}_result_gantt.svg"
draw_progress_plot: true
progress_plot_filename_format: "{}_progress_plot.png"
drop_first_values_percent: 0.0
